<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
}

.card{
width:400px;
border:none;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.card-header{
background:#667eea;
color:white;
text-align:center;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="card-header">
Student Registration
</div>

<div class="card-body">

<form action="/">

<input class="form-control mb-3" type="text" placeholder="Full Name" required>

<input class="form-control mb-3" type="email" placeholder="Email Address" required>

<input class="form-control mb-3" type="tel" placeholder="Phone Number">

<input class="form-control mb-3" type="password" placeholder="Password" required>

<input class="form-control mb-3" type="password" placeholder="Confirm Password" required>

<button class="btn btn-success w-100">Register</button>

</form>

<div class="text-center mt-3">
Already have an account?
<a href="/">Login</a>
</div>

</div>

</div>

</body>
</html>
